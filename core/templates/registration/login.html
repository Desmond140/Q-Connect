<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Q-Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-sm w-full text-center">
        <h1 class="text-2xl font-black text-red-500 tracking-tight mb-6">Sign in to Q-Connect</h1>

        <form method="POST" class="space-y-4 text-left">
            {% csrf_token %}

            {% if form.errors %}
                <p class="text-red-500 text-xs font-semibold text-center">Invalid username or password.</p>
            {% endif %}

            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Username</label>
                <input type="text" name="username" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" required>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Password</label>
                <input type="password" name="password" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" required>
            </div>

            <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200 mt-2">
                Login
            </button>
        </form>

        <p class="text-xs text-gray-500 mt-6">
            New to Q-Connect? <a href="{% url 'register' %}" class="text-red-500 font-bold hover:underline">Sign up here</a>
        </p>
    </div>

</body>
</html>
