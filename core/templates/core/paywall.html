<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Chats - Q-Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700 text-center">
        <!-- Icon -->
        <div class="w-16 h-16 bg-pink-500 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold mb-2">Unlock Unlimited Chatting</h2>
        <p class="text-gray-400 text-sm mb-6">Connect instantly with your matches by making a one-time activation payment.</p>

        <!-- Price Badge -->
        <div class="bg-gray-700/50 rounded-xl p-4 mb-6">
            <span class="text-gray-400 text-xs uppercase tracking-wider block font-semibold">One-Time Fee</span>
            <span class="text-3xl font-extrabold text-pink-400">100 KES</span>
        </div>

        <!-- Payment Actions -->
        <div class="space-y-3">
            <!-- If using M-Pesa -->
            <button class="w-full py-3 bg-green-600 hover:bg-green-500 font-bold rounded-xl transition duration-200">
                Pay with M-PESA
            </button>

            <a href="{% url 'discover' %}" class="block text-sm text-gray-400 hover:text-white transition mt-4">
                Keep Swiping (Free)
            </a>
        </div>
    </div>

</body>
</html>
